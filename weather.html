<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="weather"><!-- js출력 -->s</div>
    <script>
      async function getWeather() {
        const apiKey = "caa7c2dc95f85d3be048c03b5922b6f1";
        const city = "Daegu";
        try {
          const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=kr`,
          );
          const data = await res.json();
          console.log(data);
          const weatherBox = document.querySelector(".weather");
          weatherBox.innerHTML = `
          <h2>도시명 ${data.name}:</h2>
      <img src="https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png" alt="" />
      <p>날씨 :${data.weather[0].description}</p>
      <p>기온 : ${data.main.temp}°C</p>
      <p>체감온도 :${data.main.feels_like}</p>
      <p>습도 :${data.main.humidity}</p>
      <p>풍속 :${data.main.speed}m/s</p>
          
          `;
        } catch (e) {
          console.error(e);
        }
      }
      getWeather();
    </script>
  </body>
</html>
