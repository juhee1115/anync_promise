<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고양이 목록</title>
  </head>
  <style>
    #catList {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .card {
        width: 300px;
        border: 1px solid #ddd;
        border-radius: 10px;
        overflow: hidden;
      }

      .card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
      }

      .card h3 {
        padding: 10px;
      }

      a {
        color: #333;
        text-decoration: none;
      }
  </style>
  <body>
    <h1>고양이 목록</h1>
    <div id="catList">
      <!-- js출력 -->
    </div>
    <script>
      async function getCats() {
        const res = await fetch("cat.json");
        const cats = await res.json();
        // console.log(cats);
        const catList = document.querySelector("#catList");
        cats.forEach((cat) => {
          catList.innerHTML += `
<div class="card">
        <a href="detail.html?id=${cat.id}">
          <img src="${cat.image}" alt="${cat.name}" />
          <h3>${cat.name}</h3>
        </a>
      </div>
`;
        });
      }
      getCats();
    </script>
  </body>
</html>
