<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f7fa;
      font-family: "Pretendard", sans-serif;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2.5rem;
      color: #222;
    }

    #list {
      width: 1200px;
      max-width: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    #list li {
      list-style: none;
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    }

    #list li:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
    }

    #list img {
      width: 100%;
      height: 240px;
      object-fit: contain;
      display: block;
      margin-bottom: 20px;
    }

    #list h3 {
      font-size: 1.1rem;
      color: #222;
      margin-bottom: 12px;

      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    #list p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    #list p:nth-of-type(1) {
      font-size: 1.3rem;
      font-weight: 700;
      color: #2563eb;
    }

    #list p:nth-of-type(2) {
      display: inline-block;
      background: #eef2ff;
      color: #4f46e5;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      margin-bottom: 12px;
    }

    #list p:nth-of-type(3) {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
  <body>
    <h1>상품리스트</h1>
    <ul id="list">
      <!-- js -->
    </ul>

    <script>
      // async = 이 함수 안에서 기다릴 수 있어
      // await = 결과 나올때 까지 기다려
      // try / catch = 성공하면 try, 실패하면 catch
      //   finally = 무조건 마지막에 실행
      async function getProducts() {
        try {
          const res = await fetch("https://fakestoreapi.com/products?limit=15");
          const data = await res.json();
          const ulE = document.querySelector("#list");
          data.forEach((item) => {
            // console.log(item);
            ulE.innerHTML += ` <li>
        <img src="${item.image}" alt="${item.category}" />
        <h3>${item.title}</h3>
        <p>가격 :$${item.price}</p>
        <p>카테고리 : ${item.category}</p>
        <p>설명 : ${item.description}</p>
      </li>`;
          });
          console.log(data);
        } catch (e) {
          console.log("에러:", e);
        } finally {
          console.log("데이터 불러오기 완료!");
        }
      }
      getProducts();
    </script>
  </body>
</html>
